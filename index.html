    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              'arabic': ['"IBM Plex Sans Arabic"', 'sans-serif'],
              'luxury-serif': ['"Cormorant Garamond"', 'serif'],
              'premium-sans': ['"Outfit"', 'sans-serif'],
              'display': ['"Anton"', 'sans-serif'],
              'editorial': ['"Playfair Display"', 'serif'],
            },
            animation: {
              'float': 'float 8s ease-in-out infinite',
              'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'text-shine': 'shine 4s linear infinite',
              'luxury-drift': 'luxuryDrift 15s ease-in-out infinite',
              'border-flow': 'borderFlow 6s linear infinite',
              'spotlight': 'spotlight 3s ease-out forwards',
              'background-shine': 'backgroundShine 2s linear infinite',
              'pulse-deep': 'pulse 10s cubic-bezier(0.6, 0.2, 0.8, 0.8) infinite',
              'liquid-shine': 'liquidShine 3s ease-in-out infinite alternate',
              'border-sparkle': 'borderSparkle 4s linear infinite',
              'ethereal-drift': 'etherealDrift 20s linear infinite',
              'text-wave': 'textWave 2s ease-in-out infinite alternate',
              'liquid-bounce': 'liquidBounce 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite alternate',
              'luxury-explosion': 'luxuryExplosion 1s ease-out forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              luxuryDrift: {
                '0%, 100%': { transform: 'translate3d(0, 0, 0) scale(1)' },
                '50%': { transform: 'translate3d(2%, 2%, 0) scale(1.05)' },
              },
              shine: {
                '0%': { 'background-position': '200% center' },
                '100%': { 'background-position': '-200% center' },
              },
              borderFlow: {
                '0%': { 'background-position': '0% 50%' },
                '100%': { 'background-position': '200% 50%' },
              },
              liquidShine: {
                '0%, 100%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' },
              },
              borderSparkle: {
                '0%': { 'box-shadow': '0 0 0px var(--secondary-rgb), inset 0 0 0px var(--secondary-rgb)' },
                '50%': { 'box-shadow': '0 0 25px rgba(212,175,55,0.7), inset 0 0 15px rgba(212,175,55,0.5)' },
                '100%': { 'box-shadow': '0 0 0px var(--secondary-rgb), inset 0 0 0px var(--secondary-rgb)' },
              },
              etherealDrift: {
                '0%': { transform: 'translate3d(0, 0, 0) scale(1.0)' },
                '25%': { transform: 'translate3d(5%, -5%, 0) scale(1.05)' },
                '50%': { transform: 'translate3d(0, 0, 0) scale(1.1)' },
                '75%': { transform: 'translate3d(-5%, 5%, 0) scale(1.05)' },
                '100%': { transform: 'translate3d(0, 0, 0) scale(1.0)' },
              },
              textWave: {
                '0%, 100%': { 'text-shadow': '0 0 0px rgba(255,255,255,0.8)' },
                '50%': { 'text-shadow': '0 0 15px rgba(255,255,255,0.9), 0 0 30px rgba(212,175,55,0.6)' },
              },
              liquidBounce: {
                '0%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.05)' },
                '100%': { transform: 'scale(1)' },
              },
              luxuryExplosion: {
                '0%': { transform: 'scale(1)', 'box-shadow': '0 0 0 rgba(212,175,55,0)' },
                '50%': { transform: 'scale(1.1)', 'box-shadow': '0 0 80px rgba(212,175,55,0.9)' },
                '100%': { transform: 'scale(1)', 'box-shadow': '0 0 0 rgba(212,175,55,0)' },
              },
              reveal: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' }
              },
              scaleIn: {
                '0%': { transform: 'scale(0.9)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' }
              },
              pulseGlow: {
                '0%, 100%': { opacity: '0.3', transform: 'scale(1)' },
                '50%': { opacity: '0.6', transform: 'scale(1.1)' }
              }
            },
            colors: {
              primary: '#020202',
              secondary: '#D4AF37', /* Royal Gold */
              tertiary: '#FCD34D', /* Bright Gold */
              'accent-brown': '#B8860B', /* Dark Gold / Bronze */
              'dark-surface': '#0a0a0a', /* Darker Black */
              'bright-gold-accent': '#FCD34D', /* Brighter Gold */
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --secondary: #D4AF37;
        --secondary-rgb: 212, 175, 55;
        --tertiary: #FCD34D;
        --tertiary-rgb: 252, 211, 77;
        --bright-gold-accent: #FCD34D;
        --bright-gold-accent-rgb: 252, 211, 77;
        --accent-brown: #B8860B; /* Dark Gold / Bronze */
        --accent-brown-rgb: 184, 134, 11;
      }
      
      html, body {
        background-color: #020202 !important;
        color: #e5e7eb;
        margin: 0;
        padding: 0;
      }

      @keyframes border-beam {
        0% { transform: translateX(-100%) skewX(-30deg); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translateX(200%) skewX(-30deg); opacity: 0; }
      }

      @keyframes border-trace {
        0%, 100% { clip-path: inset(0 0 95% 0); }
        25% { clip-path: inset(0 95% 0 0); }
        50% { clip-path: inset(95% 0 0 0); }
        75% { clip-path: inset(0 0 0 95%); }
      }

      .animate-border-beam {
        animation: border-beam 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        overflow-x: hidden;
        width: 100%;
        background-color: #020202;
        color: #e5e7eb;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior-y: none; 
      }
      
      body::after { 
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.05) 0%, rgba(2, 2, 2, 0) 60%),
                    radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.05) 0%, rgba(2, 2, 2, 0) 70%);
        background-size: cover;
        pointer-events: none;
        z-index: -1;
      }

      .font-arabic { font-family: 'IBM Plex Sans Arabic', sans-serif !important; }
      .font-premium-sans { font-family: 'Outfit', sans-serif !important; }

      [lang="en"] h1, [lang="en"] h2, [lang="en"] h3,
      [lang="de"] h1, [lang="de"] h2, [lang="de"] h3 {
        font-family: 'Cormorant Garamond', serif !important;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      [lang="ar"] h1, [lang="ar"] h2, [lang="ar"] h3 {
        font-family: 'IBM Plex Sans Arabic', sans-serif !important;
        font-weight: 700;
      }

      .glass-card {
        background: rgba(10, 10, 10, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(212, 175, 55, 0.1);
      }

      ::selection {
        background: var(--secondary);
        color: black;
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #020202; }
      ::-webkit-scrollbar-thumb {
        background: var(--secondary);
        border-radius: 10px;
      }

      .luxury-glow-border {
        position: relative;
        overflow: hidden;
        transform: translate3d(0,0,0); 
      }
      .luxury-glow-border::before {
        content: '';
        position: absolute;
        inset: -1.5px;
        border-radius: inherit;
        padding: 1.5px;
        background: linear-gradient(
          var(--border-angle, 0deg), 
          rgba(var(--secondary-rgb), 0.8) 0%, 
          rgba(var(--bright-gold-accent-rgb), 1) 20%, 
          rgba(var(--secondary-rgb), 0.1) 50%, 
          rgba(var(--bright-gold-accent-rgb), 1) 80%, 
          rgba(var(--secondary-rgb), 0.8) 100%
        );
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude;
        -webkit-mask-composite: exclude;
        opacity: 0.2; 
        transition: opacity 0.5s ease-in-out;
        pointer-events: none;
        z-index: -1;
        animation: rotateBorder 6s linear infinite;
      }
      
      @keyframes rotateBorder {
        from { --border-angle: 0deg; }
        to { --border-angle: 360deg; }
      }

      @property --border-angle {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
      }
      .luxury-glow-border:hover::before {
        opacity: 1;
      }

      .bg-luxury-box-texture {
        background-color: rgba(5, 5, 5, 0.7);
        background-blend-mode: overlay;
      }
      
      .gpu-accelerated {
        transform: translate3d(0, 0, 0);
        backface-visibility: hidden;
        perspective: 1000px;
      }

      @media (max-width: 768px) {
        .animate-liquid-bounce,
        .animate-luxury-drift,
        .animate-border-flow,
        .animate-liquid-shine,
        .animate-border-sparkle,
        .animate-ethereal-drift,
        .animate-luxury-explosion {
          animation: none !important;
        }
      }
      
      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
